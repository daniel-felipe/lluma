<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>GoBarber — Barber Dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bone-200); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/Primitives.jsx"></script>
<script type="text/babel" src="./BarberScreens.jsx"></script>
<script type="text/babel">
const BOOKINGS = [
  { time: "10:00am", dur: 30, name: "Jamal Torres",   service: "Skin fade",       initials: "JT", tone: "amber", status: "ok",   statusLabel: "Done",      price: 40 },
  { time: "11:30am", dur: 45, name: "Sam Kim",        service: "Cut + beard trim",initials: "SK", tone: "bone",  status: "ok",   statusLabel: "Done",      price: 55 },
  { time: "2:30pm",  dur: 45, name: "Marcus Reyes",   service: "Cut + beard trim",initials: "MR", tone: "ink",   status: "pending", statusLabel: "Up next", price: 55, active: true },
  { time: "3:30pm",  dur: 30, name: "Diego Alvarez",  service: "Cut",             initials: "DA", tone: "ink",   status: "neutral", statusLabel: "Booked",  price: 35 },
  { time: "4:15pm",  dur: 30, name: "Theo Brennan",   service: "Lineup",          initials: "TB", tone: "amber", status: "neutral", statusLabel: "Booked",  price: 25 },
  { time: "5:30pm",  dur: 60, name: "Walk-in slot",   service: "Open",            initials: "+",  tone: "bone",  status: null },
];

function App() {
  const [tab, setTab] = React.useState("today");
  const [sheet, setSheet] = React.useState(null);

  return (
    <PhoneFrame>
      {tab === "today"    && <TodayScreen bookings={BOOKINGS} onPick={setSheet} />}
      {tab === "clients"  && <ClientsScreen />}
      {tab === "earnings" && <EarningsScreen />}
      {tab === "settings" && <div style={{ flex: 1, background: "var(--bone-50)", padding: 16 }}><h1>Settings</h1><p style={{ marginTop: 12, color: "var(--fg-3)" }}>Account, hours, services, payments.</p></div>}
      <TabBar tab={tab} setTab={setTab} />
      {sheet && <BookingDetailSheet b={sheet} onClose={() => setSheet(null)} />}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>GoBarber — Book a Chair</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bone-200); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/Primitives.jsx"></script>
<script type="text/babel" src="./ClientScreens.jsx"></script>
<script type="text/babel">
const BARBERS = [
  { name: "Marcus Reyes", initials: "MR", shop: "Sharp & Co.",   dist: "0.4 mi", rating: 4.9, reviews: 184, from: 35, next: "2:30pm",
    bg: "linear-gradient(135deg, #B86F1F, #6B3D10)", fg: "#FAF7F2" },
  { name: "Devon Park",   initials: "DP", shop: "The Standard",  dist: "0.8 mi", rating: 4.8, reviews: 92,  from: 30, next: "12:15pm",
    bg: "linear-gradient(135deg, #15130F, #2A2620)", fg: "#FAF7F2" },
  { name: "Aisha Coleman",initials: "AC", shop: "Crown Studio",  dist: "1.1 mi", rating: 5.0, reviews: 67,  from: 45, next: "Tomorrow",
    bg: "linear-gradient(135deg, #E9E2D4, #D6CDBC)", fg: "#15130F" },
  { name: "Niko Vasquez", initials: "NV", shop: "Eastside Cuts", dist: "1.4 mi", rating: 4.7, reviews: 215, from: 25, next: "1:00pm",
    bg: "linear-gradient(135deg, #45403A, #15130F)", fg: "#FAF7F2" },
];

function App() {
  const [screen, setScreen] = React.useState("home"); // home | book | confirmed
  const [picked, setPicked] = React.useState(null);
  const [booking, setBooking] = React.useState(null);

  return (
    <PhoneFrame>
      {screen === "home"      && <HomeScreen      barbers={BARBERS} onPick={(b) => { setPicked(b); setScreen("book"); }} />}
      {screen === "book"      && <BookingScreen   b={picked} onBack={() => setScreen("home")} onConfirm={(bk) => { setBooking(bk); setScreen("confirmed"); }} />}
      {screen === "confirmed" && <ConfirmedScreen booking={booking} onDone={() => setScreen("home")} />}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

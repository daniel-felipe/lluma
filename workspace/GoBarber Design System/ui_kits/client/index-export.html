    <text x="60" y="132" font-family="sans-serif" font-weight="700" font-size="22" fill="#A89E8A">Skip the wait.</text>

    <rect x="204" y="280" width="130" height="110" rx="8" fill="#FFFFFF" stroke="#E9E2D4" stroke-width="1"/>
    <rect x="204" y="280" width="130" height="60" rx="8" fill="#15130F"/>

    <rect x="56" y="404" width="130" height="110" rx="8" fill="#FFFFFF" stroke="#E9E2D4" stroke-width="1"/>
    <rect x="56" y="404" width="130" height="60" rx="8" fill="#E9E2D4"/>
    <text x="105" y="446" font-family="sans-serif" font-weight="700" font-size="20" fill="#15130F" text-anchor="middle">AC</text>
    <rect x="204" y="404" width="130" height="110" rx="8" fill="#FFFFFF" stroke="#E9E2D4" stroke-width="1"/>
    <rect x="204" y="404" width="130" height="60" rx="8" fill="#45403A"/>
    <text x="269" y="446" font-family="sans-serif" font-weight="700" font-size="20" fill="#FAF7F2" text-anchor="middle">NV</text>
    <!-- amber scissors accent -->
    <g transform="translate(171,560) scale(2.2)" stroke="#B86F1F" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="3"/>
      <circle cx="6" cy="18" r="3"/>
      <line x1="20" y1="4" x2="8.12" y2="15.88"/>
      <line x1="14.47" y1="14.48" x2="20" y2="20"/>

</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/Primitives.jsx"></script>
<script type="text/babel" src="./ClientScreens.jsx"></script>
<script type="text/babel">
const BARBERS = [
  { name: "Marcus Reyes", initials: "MR", shop: "Sharp & Co.",   dist: "0.4 mi", rating: 4.9, reviews: 184, from: 35, next: "2:30pm",
    bg: "linear-gradient(135deg, #B86F1F, #6B3D10)", fg: "#FAF7F2" },
  { name: "Devon Park",   initials: "DP", shop: "The Standard",  dist: "0.8 mi", rating: 4.8, reviews: 92,  from: 30, next: "12:15pm",
    bg: "linear-gradient(135deg, #15130F, #2A2620)", fg: "#FAF7F2" },
  { name: "Aisha Coleman",initials: "AC", shop: "Crown Studio",  dist: "1.1 mi", rating: 5.0, reviews: 67,  from: 45, next: "Tomorrow",
    bg: "linear-gradient(135deg, #E9E2D4, #D6CDBC)", fg: "#15130F" },
  { name: "Niko Vasquez", initials: "NV", shop: "Eastside Cuts", dist: "1.4 mi", rating: 4.7, reviews: 215, from: 25, next: "1:00pm",
    bg: "linear-gradient(135deg, #45403A, #15130F)", fg: "#FAF7F2" },
];

function App() {
  const [screen, setScreen] = React.useState("home"); // home | book | confirmed
  const [picked, setPicked] = React.useState(null);
  const [booking, setBooking] = React.useState(null);

  return (
    <PhoneFrame>
      {screen === "home"      && <HomeScreen      barbers={BARBERS} onPick={(b) => { setPicked(b); setScreen("book"); }} />}
      {screen === "book"      && <BookingScreen   b={picked} onBack={() => setScreen("home")} onConfirm={(bk) => { setBooking(bk); setScreen("confirmed"); }} />}
      {screen === "confirmed" && <ConfirmedScreen booking={booking} onDone={() => setScreen("home")} />}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

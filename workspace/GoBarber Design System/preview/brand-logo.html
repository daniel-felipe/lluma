<!doctype html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Wordmark on Ink — primary lockup" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: #15130F; }
  .card { padding: 28px 24px; background: #15130F; }
  .wm { display: flex; align-items: center; gap: 32px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .mark { width: 56px; height: 56px; border-radius: 12px; background: #FAF7F2; display: grid; place-items: center; }
  .text { font: 700 32px/1 var(--font-display); letter-spacing: -0.02em; color: #FAF7F2; }
  .sub { font-family: var(--font-mono); font-size: 11px; color: #A89E8A; margin-top: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
</style></head>
<body>
<div class="card">
  <div class="wm">
    <div class="lockup">
      <div class="mark">
        <svg width="38" height="38" viewBox="0 0 64 64">
          <rect x="14" y="12" width="4" height="40" transform="rotate(20 16 32)" fill="#15130F"/>
          <rect x="22" y="12" width="4" height="40" transform="rotate(20 24 32)" fill="#B86F1F"/>
          <rect x="30" y="12" width="4" height="40" transform="rotate(20 32 32)" fill="#15130F"/>
          <rect x="38" y="12" width="4" height="40" transform="rotate(20 40 32)" fill="#B86F1F"/>
          <rect x="46" y="12" width="4" height="40" transform="rotate(20 48 32)" fill="#15130F"/>
        </svg>
      </div>
      <div>
        <div class="text">GoBarber</div>
        <div class="sub">Wordmark · primary lockup</div>
      </div>
    </div>
  </div>
</div>
</body></html>

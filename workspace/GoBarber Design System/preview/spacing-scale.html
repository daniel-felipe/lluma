<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4-point base, 1 → 80px" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 24px; }
  .scale { display: grid; grid-template-columns: 60px 1fr; gap: 12px 16px; align-items: center; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { height: 12px; background: var(--ink-900); border-radius: 4px; }
</style></head>
<body>
<div class="card">
  <div class="scale">
    <div class="tok">space-1</div><div class="bar" style="width:4px"></div>
    <div class="tok">space-2</div><div class="bar" style="width:8px"></div>
    <div class="tok">space-3</div><div class="bar" style="width:12px"></div>
    <div class="tok">space-4</div><div class="bar" style="width:16px"></div>
    <div class="tok">space-6</div><div class="bar" style="width:24px"></div>
    <div class="tok">space-8</div><div class="bar" style="width:32px"></div>
    <div class="tok">space-12</div><div class="bar" style="width:48px"></div>
    <div class="tok">space-16</div><div class="bar" style="width:64px"></div>
    <div class="tok">space-20</div><div class="bar" style="width:80px"></div>
  </div>
</div>
</body></html>

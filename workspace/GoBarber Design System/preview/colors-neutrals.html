<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals — Ink & Bone" subtitle="Off-black surfaces and warm cream paper" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 28px 24px; }
  .swatch-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: flex-end; padding: 8px; font: 600 10px var(--font-mono); border: 1px solid rgba(0,0,0,0.06); }
  .sw.light { color: var(--ink-900); }
  .sw.dark  { color: var(--bone-50); }
  .heading { font: 600 13px/1 var(--font-body); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-3); }
  .group { margin-bottom: 18px; }
</style></head>
<body>
<div class="card">
  <div class="group">
    <div class="heading">Ink — off-black surfaces</div>
    <div class="swatch-row">
      <div class="sw dark" style="background:#0E0D0B">950</div>
      <div class="sw dark" style="background:#15130F">900</div>
      <div class="sw dark" style="background:#1F1C18">800</div>
      <div class="sw dark" style="background:#2A2620">700</div>
      <div class="sw dark" style="background:#3A3530">600</div>
    </div>
  </div>
  <div>
    <div class="heading">Bone — cream neutrals</div>
    <div class="swatch-row">
      <div class="sw light" style="background:#FAF7F2">50</div>
      <div class="sw light" style="background:#F4EFE6">100</div>
      <div class="sw light" style="background:#E9E2D4">200</div>
      <div class="sw light" style="background:#D6CDBC">300</div>
      <div class="sw light" style="background:#A89E8A">400</div>
    </div>
  </div>
</div>
</body></html>

<!doctype html>
<!-- @dsCard group="Spacing" name="Corner radii" subtitle="Sharp 4–24px + pill" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--bone-200); border: 1px solid var(--bone-300); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
<div class="card">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">lg · 16</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="lbl">xl · 24</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div></div>
</div>
</body></html>

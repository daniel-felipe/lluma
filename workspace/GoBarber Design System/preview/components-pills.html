<!doctype html>
<!-- @dsCard group="Components" name="Pills & chips" subtitle="Status pills and time-slot chips" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 28px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font: 600 12px var(--font-body); letter-spacing: 0.02em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .ok   { background: #E0EBDA; color: #2F4A2C; }
  .ok .dot { background: #4F7A4A; }
  .pend { background: #FBF1E6; color: #6B3D10; }
  .pend .dot { background: #D98B2F; }
  .can  { background: #F4DDD5; color: #6E2A19; }
  .can .dot { background: #B5462E; }
  .info { background: #DCE4EE; color: #25395B; }
  .info .dot { background: #3D5A7A; }
  .neutral { background: #F4EFE6; color: #45403A; }
  .neutral .dot { background: #6F6759; }
  .chip { padding: 8px 12px; border: 1px solid #D6CDBC; border-radius: 8px; font: 500 13px var(--font-body); background: #FFF; color: #15130F; }
  .chip.active { background: #15130F; color: #FAF7F2; border-color: #15130F; }
</style></head>
<body>
<div class="card">
  <span class="pill ok"><span class="dot"></span>Confirmed</span>
  <span class="pill pend"><span class="dot"></span>Pending</span>
  <span class="pill can"><span class="dot"></span>Cancelled</span>
  <span class="pill info"><span class="dot"></span>Walk-in</span>
  <span class="pill neutral"><span class="dot"></span>Regular</span>
  <span class="chip">9:00am</span>
  <span class="chip active">2:30pm</span>
  <span class="chip">3:00pm</span>
</div>
</body></html>

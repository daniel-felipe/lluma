<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Default, focused, error" viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; font-weight: 500; color: #45403A; }
  .input { padding: 12px 14px; border: 1px solid #D6CDBC; border-radius: 8px; background: #FFF; font: 15px var(--font-body); color: #15130F; }
  .input:focus { outline: 2px solid #B86F1F; outline-offset: 2px; border-color: #B86F1F; }
  .input::placeholder { color: #A89E8A; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .err { border-color: #B5462E; }
  .help { font-size: 12px; color: #B5462E; }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="field"><label>Name</label><input class="input" value="Marcus Reyes"></div>
    <div class="field"><label>Phone</label><input class="input" placeholder="(555) 010-0192"></div>
  </div>
  <div class="field"><label>Notes for your barber</label><input class="input" placeholder="Tighter on the sides than last time"></div>
  <div class="field"><label>Promo code</label><input class="input err" value="OFF20"><div class="help">That code expired last month.</div></div>
</div>
</body></html>

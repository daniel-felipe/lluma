<!doctype html>
<!-- @dsCard group="Components" name="Avatars" subtitle="Initials avatars with status dots" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: #FAF7F2; }
  .card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .ava { aspect-ratio: 1; border-radius: 999px; display: grid; place-items: center; font: 600 22px var(--font-display); letter-spacing: -0.02em; }
  .a1 { background: #15130F; color: #FAF7F2; }
  .a2 { background: #B86F1F; color: #FFF; }
  .a3 { background: #F4EFE6; color: #15130F; border: 1px solid #E9E2D4; }
  .with-status { position: relative; }
  .status { position: absolute; bottom: 4px; right: 4px; width: 16px; height: 16px; border-radius: 999px; border: 2px solid #FAF7F2; }
  .ok { background: #4F7A4A; }
  .pending { background: #D98B2F; }
</style></head>
<body>
<div class="card">
  <div class="ava a1 with-status">MR<span class="status ok"></span></div>
  <div class="ava a2 with-status">JT<span class="status pending"></span></div>
  <div class="ava a3 with-status">SK<span class="status ok"></span></div>
</div>
</body></html>

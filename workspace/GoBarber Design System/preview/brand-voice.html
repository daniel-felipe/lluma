<!doctype html>
<!-- @dsCard group="Brand" name="Voice — good vs bad" subtitle="How copy reads" viewport="700x280" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 28px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .quote { flex: 1; padding: 14px 16px; border-left: 2px solid var(--accent); background: #FBF1E6; border-radius: 0 8px 8px 0; font: 500 14px/1.45 var(--font-body); color: #15130F; }
  .quote.bad { border-left-color: #B5462E; background: #F4DDD5; color: #6E2A19; text-decoration: line-through; opacity: 0.7; }
  .label { font: 600 11px var(--font-body); text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); width: 60px; padding-top: 16px; flex-shrink: 0; }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="label">Good</div>
    <div class="quote">You're booked with Marcus for 2:30pm Saturday.</div>
  </div>
  <div class="row">
    <div class="label">Good</div>
    <div class="quote">No bookings today. Slow days happen — go pull espresso.</div>
  </div>
  <div class="row">
    <div class="label">Bad</div>
    <div class="quote bad">We're so excited to confirm your booking!! 💈</div>
  </div>
</div>
</body></html>

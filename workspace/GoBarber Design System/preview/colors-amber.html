<!doctype html>
<!-- @dsCard group="Colors" name="Amber — signature accent" subtitle="Primary brand color, full scale 50–600" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 28px 24px; }
  .swatch-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: flex-end; padding: 8px; font: 600 10px var(--font-mono); }
  .sw.light { color: var(--ink-900); }
  .sw.dark  { color: var(--bone-50); }
  .heading { font: 600 13px/1 var(--font-body); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-3); }
</style></head>
<body>
<div class="card">
  <div class="heading">Amber — signature accent</div>
  <div class="swatch-row">
    <div class="sw light" style="background:#FBF1E6">50</div>
    <div class="sw light" style="background:#F5DFC1">100</div>
    <div class="sw light" style="background:#EFC58E">200</div>
    <div class="sw light" style="background:#E5A658">300</div>
    <div class="sw dark"  style="background:#D98B2F">400</div>
    <div class="sw dark"  style="background:#B86F1F">500</div>
    <div class="sw dark"  style="background:#8F5316">600</div>
  </div>
</div>
</body></html>

<!doctype html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Warm-tinted shadows, four levels" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: #F4EFE6; }
  .card { padding: 32px 24px; background: #F4EFE6; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 110px; height: 78px; background: #FFFFFF; border-radius: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
<div class="card">
  <div class="item"><div class="box" style="box-shadow: 0 1px 0 rgba(21,19,15,.04), 0 1px 2px rgba(21,19,15,.06)"></div><div class="lbl">shadow-1 · resting</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 1px 0 rgba(21,19,15,.04), 0 4px 12px rgba(21,19,15,.08)"></div><div class="lbl">shadow-2 · raised</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 2px 0 rgba(21,19,15,.04), 0 12px 32px rgba(21,19,15,.14)"></div><div class="lbl">shadow-3 · sheet</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 4px 0 rgba(21,19,15,.04), 0 24px 56px rgba(21,19,15,.20)"></div><div class="lbl">shadow-4 · splash</div></div>
</div>
</body></html>

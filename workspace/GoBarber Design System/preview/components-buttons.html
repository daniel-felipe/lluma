<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, secondary, ghost, danger, dark" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 28px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { font-family: var(--font-body); font-weight: 600; font-size: 15px; padding: 12px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; letter-spacing: -0.01em; }
  .primary   { background: #B86F1F; color: #FFF; }
  .primary:hover { background: #8F5316; }
  .secondary { background: #FFF; color: #15130F; border-color: #D6CDBC; }
  .ghost     { background: transparent; color: #15130F; }
  .danger    { background: #B5462E; color: #FFF; }
  .dark      { background: #15130F; color: #FAF7F2; }
  .sm        { font-size: 13px; padding: 8px 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 100%; margin-top: 6px; }
</style></head>
<body>
<div class="card">
  <button class="btn primary">Book a chair</button>
  <button class="btn dark">Confirm</button>
  <button class="btn secondary">Reschedule</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Delete</button>
  <button class="btn primary sm">Save</button>
  <button class="btn secondary sm">+ Add</button>
</div>
</body></html>

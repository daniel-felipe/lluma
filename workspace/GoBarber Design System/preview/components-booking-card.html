<!doctype html>
<!-- @dsCard group="Components" name="Booking card" subtitle="Resting card with avatar, status pill, mono ID" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; background: #F4EFE6; }
  .card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: #F4EFE6; }
  .booking { background: #FFF; border: 1px solid #E9E2D4; border-radius: 12px; padding: 16px; box-shadow: 0 1px 0 rgba(21,19,15,.04), 0 1px 2px rgba(21,19,15,.06); display: flex; gap: 12px; }
  .ava { width: 44px; height: 44px; border-radius: 999px; background: #15130F; color: #FAF7F2; display: grid; place-items: center; font: 600 15px var(--font-display); flex-shrink: 0; }
  .ava.amber { background: #B86F1F; }
  .who { font: 600 16px var(--font-display); color: #15130F; letter-spacing: -0.01em; }
  .what { font-size: 13px; color: #6F6759; margin-top: 2px; }
  .when { margin-left: auto; text-align: right; }
  .time { font: 600 15px/1 var(--font-display); color: #15130F; font-variant-numeric: tabular-nums; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: #A89E8A; margin-top: 4px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; font: 600 11px var(--font-body); margin-top: 6px; background: #E0EBDA; color: #2F4A2C; }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: #4F7A4A; }
</style></head>
<body>
<div class="card">
  <div class="booking">
    <div class="ava">MR</div>
    <div>
      <div class="who">Marcus Reyes</div>
      <div class="what">Cut + beard trim · 45 min</div>
      <div class="pill"><span class="dot"></span>Confirmed</div>
    </div>
    <div class="when"><div class="time">2:30pm</div><div class="meta">BK-9X42T</div></div>
  </div>
  <div class="booking">
    <div class="ava amber">JT</div>
    <div>
      <div class="who">Jamal Torres</div>
      <div class="what">Skin fade · 30 min</div>
      <div class="pill"><span class="dot"></span>Confirmed</div>
    </div>
    <div class="when"><div class="time">3:15pm</div><div class="meta">BK-9X43A</div></div>
  </div>
</div>
</body></html>
